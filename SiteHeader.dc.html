<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<header style="font-family:'Source Sans 3',system-ui,sans-serif;position:relative;z-index:20;">
  <div style="position:sticky;top:0;z-index:30;background:#ffffff;border-bottom:1px solid #e4e9ee;box-shadow:0 1px 8px rgba(23,86,143,0.06);">
    <div style="max-width:1180px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;">
      <a href="index.dc.html" style="display:flex;align-items:center;flex:0 0 auto;text-decoration:none;">
        <svg viewBox="0 0 300 120" role="img" aria-label="Sanperhouse — Abogados y Administrador de Fincas en Madrid" style="height:48px;width:auto;display:block;"><text x="6" y="50" font-family="'Libre Franklin',sans-serif" font-weight="600" font-size="44"><tspan fill="#f0a81e">S</tspan><tspan fill="#1c6cb5">anper</tspan></text><text x="4" y="107" font-family="'Libre Franklin',sans-serif" font-weight="800" font-size="54" letter-spacing="0.5"><tspan fill="#f0a81e">H</tspan><tspan fill="#1c6cb5">OUSE</tspan></text><g><rect x="206" y="26" width="15" height="84" fill="#f2d489"/><rect x="221" y="26" width="15" height="84" fill="#1c6cb5"/><rect x="244" y="46" width="13" height="64" fill="#f2d489"/><rect x="257" y="46" width="13" height="64" fill="#1c6cb5"/><rect x="279" y="64" width="10" height="46" fill="#f2d489"/><rect x="289" y="64" width="10" height="46" fill="#1c6cb5"/></g></svg>
      </a>
      <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
        <button type="button" onClick="{{ toggle }}" aria-label="Abrir menú" style="background:none;border:0;cursor:pointer;display:flex;flex-direction:column;gap:5px;padding:8px;">
          <span style="width:26px;height:3px;background:#1c6cb5;border-radius:2px;display:block;"></span>
          <span style="width:26px;height:3px;background:#1c6cb5;border-radius:2px;display:block;"></span>
          <span style="width:26px;height:3px;background:#1c6cb5;border-radius:2px;display:block;"></span>
        </button>
      </sc-if>
      <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
        <nav style="display:flex;align-items:center;gap:2px;flex-wrap:wrap;justify-content:flex-end;">
          <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="7">
            <a href="{{ item.href }}" style="{{ item.style }}">{{ item.label }}</a>
          </sc-for>
          <a href="tel:+34913885989" style="display:inline-flex;align-items:center;gap:6px;margin-left:10px;padding:8px 14px;background:#f0a81e;color:#17568f;font-weight:700;font-size:14px;border-radius:4px;text-decoration:none;white-space:nowrap;">91 388 59 89</a>
        </nav>
      </sc-if>
    </div>
    <sc-if value="{{ mobileOpen }}" hint-placeholder-val="{{ false }}">
      <nav style="border-top:1px solid #eef2f6;background:#ffffff;padding:6px 16px 14px;display:flex;flex-direction:column;">
        <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="7">
          <a href="{{ item.href }}" style="{{ item.mobileStyle }}">{{ item.label }}</a>
        </sc-for>
        <sc-for list="{{ subItems }}" as="item" hint-placeholder-count="3">
          <a href="{{ item.href }}" style="padding:9px 4px;color:#5b636b;font-size:14px;text-decoration:none;">{{ item.label }}</a>
        </sc-for>
        <a href="tel:+34913885989" style="margin-top:8px;padding:11px 14px;background:#f0a81e;color:#17568f;font-weight:700;border-radius:4px;text-decoration:none;text-align:center;">91 388 59 89</a>
      </nav>
    </sc-if>
  </div>

  <div style="position:relative;background:#12324f url('assets/header-bg.webp') center center / cover no-repeat;overflow:hidden;">
    <div style="position:absolute;inset:0;background:linear-gradient(115deg,rgba(18,50,79,0.93) 0%,rgba(23,86,143,0.80) 46%,rgba(28,108,181,0.55) 100%);"></div>
    <div style="position:relative;max-width:1180px;margin:0 auto;padding:clamp(34px,7vw,72px) 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
      <div style="min-width:220px;">
        <div style="color:#ffffff;font-size:clamp(20px,3.4vw,30px);font-weight:700;line-height:1.15;text-shadow:0 1px 6px rgba(0,0,0,0.28);">Somos Abogados Especialistas</div>
        <div style="color:#f0a81e;font-size:clamp(15px,2vw,19px);font-weight:600;margin-top:4px;text-shadow:0 1px 4px rgba(0,0,0,0.28);">Pruébanos · Primera consulta gratis</div>
      </div>
    </div>
  </div>
  <div style="background:#f4f7fa;border-bottom:1px solid #e4e9ee;">
    <div style="max-width:1180px;margin:0 auto;padding:9px 20px;display:flex;gap:22px;flex-wrap:wrap;">
      <sc-for list="{{ subItems }}" as="item" hint-placeholder-count="3">
        <a href="{{ item.href }}" style="{{ item.style }}">{{ item.label }}</a>
      </sc-for>
    </div>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:420},&quot;active&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;firma&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;pageTitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { isMobile: false, open: false };
  componentDidMount() {
    this.mq = window.matchMedia('(max-width: 900px)');
    this._on = () => this.setState({ isMobile: this.mq.matches, open: false });
    this._on();
    this.mq.addEventListener('change', this._on);
  }
  componentWillUnmount() { if (this.mq) this.mq.removeEventListener('change', this._on); }
  renderVals() {
    const active = this.props.active || '';
    const linkBase = 'display:inline-block;padding:8px 10px;font-size:13.5px;font-weight:600;letter-spacing:0.02em;text-decoration:none;text-transform:uppercase;border-bottom:3px solid transparent;';
    const base = [
      { label: 'Firma', href: 'index.dc.html', key: 'firma' },
      { label: 'Servicios', href: 'servicios.dc.html', key: 'servicios' },
      { label: 'Abogados', href: 'abogados.dc.html', key: 'abogados' },
      { label: 'Administrador de Fincas', href: 'administrador-fincas.dc.html', key: 'admin' },
      { label: 'Fincas 24 Horas', href: 'fincas-24-horas.dc.html', key: 'fincas24' },
      { label: 'Contacto', href: 'contacto.dc.html', key: 'contacto' },
    ];
    const navItems = base.map(it => {
      const on = it.key === active;
      return {
        ...it,
        style: linkBase + 'color:' + (on ? '#1c6cb5' : '#3a4650') + ';border-bottom-color:' + (on ? '#f0a81e' : 'transparent') + ';',
        mobileStyle: 'padding:11px 4px;font-size:15px;font-weight:600;text-transform:uppercase;text-decoration:none;border-bottom:1px solid #eef2f6;color:' + (on ? '#1c6cb5' : '#3a4650') + ';',
      };
    });
    const subBase = [
      { label: 'Razones para elegirnos', href: 'razones.dc.html', key: 'razones' },
      { label: 'Nuestro equipo', href: 'equipo.dc.html', key: 'equipo' },
      { label: 'Únete a nosotros', href: 'unete.dc.html', key: 'unete' },
    ];
    const subItems = subBase.map(it => {
      const on = it.key === active;
      return { ...it, style: 'font-size:14px;font-weight:600;text-decoration:none;color:' + (on ? '#1c6cb5' : '#5b636b') + ';' + (on ? 'text-decoration:underline;text-underline-offset:4px;text-decoration-color:#f0a81e;' : '') };
    });
    return {
      isMobile: this.state.isMobile,
      isDesktop: !this.state.isMobile,
      mobileOpen: this.state.isMobile && this.state.open,
      toggle: () => this.setState(s => ({ open: !s.open })),
      navItems, subItems,
      pageTitle: this.props.pageTitle || '',
    };
  }
}
</script>
</body>
</html>
